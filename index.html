<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mayur Khamkar is a full stack MERN developer focused on backend systems, REST APIs, JWT authentication, and scalable application architecture."
    />
    <title>Mayur Khamkar | Full Stack Developer</title>
    <script>
      (() => {
        const storageKey = "mayur-portfolio-theme";
        const storedTheme = localStorage.getItem(storageKey);
        const theme =
          storedTheme === "light" || storedTheme === "dark"
            ? storedTheme
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";

        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
