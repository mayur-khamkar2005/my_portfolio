<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mayur Khamkar is a fresher full stack developer who enjoys backend work, APIs, authentication, and building MERN stack projects."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Patrick+Hand&display=swap"
    />
    <title>Mayur Khamkar | Full Stack Developer</title>
    <script>
      (() => {
        const themeStorageKey = "mayur-portfolio-theme";
        const visualModeStorageKey = "mayur-portfolio-visual-mode";
        const themeColorMap = {
          light: {
            clean: "#f5f7fb",
            sketch: "#fbf7ef",
          },
          dark: {
            clean: "#090c12",
            sketch: "#171411",
          },
        };
        const storedTheme = localStorage.getItem(themeStorageKey);
        const storedVisualMode = localStorage.getItem(visualModeStorageKey);
        const theme =
          storedTheme === "light" || storedTheme === "dark"
            ? storedTheme
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        const visualMode =
          storedVisualMode === "clean" || storedVisualMode === "sketch"
            ? storedVisualMode
            : "sketch";

        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.visualMode = visualMode;
        document.documentElement.style.colorScheme = theme;

        const themeColor =
          themeColorMap[theme]?.[visualMode] ?? themeColorMap.light.clean;
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');

        if (themeColorMeta) {
          themeColorMeta.setAttribute("content", themeColor);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
